<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireReady AI | Login</title>
  <style>
    :root {
      --bg: #eef4ff;
      --bg-2: #f9fbff;
      --surface: rgba(255, 255, 255, 0.6);
      --surface-strong: rgba(255, 255, 255, 0.8);
      --text: #10203b;
      --muted: #5e6b84;
      --border: rgba(70, 92, 140, 0.16);
      --primary: #2d6bff;
      --primary-2: #6b4dff;
      --accent: #8e69ff;
      --shadow: 0 24px 60px rgba(24, 43, 86, 0.14);
      --shadow-hover: 0 30px 70px rgba(24, 43, 86, 0.2);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
    }

    [data-theme="dark"] {
      --bg: #08111f;
      --bg-2: #111c32;
      --surface: rgba(12, 20, 38, 0.62);
      --surface-strong: rgba(15, 25, 45, 0.84);
      --text: #f3f7ff;
      --muted: #aab7d0;
      --border: rgba(168, 190, 255, 0.14);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      --shadow-hover: 0 30px 70px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
      length: 20px;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(21, 46, 104, 0.24), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(142, 105, 255, 0.26), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(89, 170, 255, 0.18), transparent 32%),
        linear-gradient(145deg, var(--bg), var(--bg-2));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 55%, transparent 100%);
      opacity: 0.25;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.7;
      animation: float 14s ease-in-out infinite;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      left: -30px;
      top: 12%;
      background: rgba(45, 107, 255, 0.28);
    }

    .orb.two {
      width: 220px;
      height: 220px;
      right: -50px;
      top: 20%;
      background: rgba(142, 105, 255, 0.24);
      animation-delay: -4s;
    }

    .orb.three {
      width: 260px;
      height: 260px;
      left: 25%;
      bottom: -90px;
      background: rgba(88, 169, 255, 0.2);
      animation-delay: -8s;
    }

    @keyframes float {

      0%,
      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(0, -18px, 0) scale(1.05);
      }
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(1180px, 100%);
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      align-items: stretch;
    }

    .panel {
      height: 500px;

      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
      padding-left: 30%;
      padding-right: 30%;
      margin-top: 5%;



    }

    .panel:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(120, 144, 255, 0.28);
    }

    .brand-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-size: 1.55rem;
      box-shadow: 0 16px 30px rgba(45, 107, 255, 0.28);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .theme-toggle {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      display: grid;
      place-items: center;
      box-shadow: 0 10px 22px rgba(50, 72, 120, 0.12);
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .left {
      padding: 24px 24px 26px;
      display: grid;
      gap: 20px;
    }

    .hero-copy {
      display: grid;
      gap: 16px;
      padding: 12px 0 2px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(45, 107, 255, 0.1);
      color: var(--primary);
      border: 1px solid rgba(45, 107, 255, 0.14);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .hero-copy h2 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.9rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
    }

    .typing-wrap {
      font-size: clamp(1.02rem, 1.8vw, 1.25rem);
      color: var(--muted);
      min-height: 3.5em;
      line-height: 1.6;
    }

    .typing-line {
      color: var(--text);
      font-weight: 700;
    }

    .typing-cursor {
      display: inline-block;
      width: 10px;
      margin-left: 3px;
      background: linear-gradient(180deg, var(--primary), var(--accent));
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {

      0%,
      49% {
        opacity: 1;
      }

      50%,
      100% {
        opacity: 0;
      }
    }

    .benefits {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(124, 145, 193, 0.18);
      color: var(--text);
      font-size: 0.86rem;
      box-shadow: 0 10px 24px rgba(26, 41, 74, 0.05);
    }

    .micro-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .micro-card {
      padding: 15px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(124, 145, 193, 0.14);
      min-height: 92px;
    }

    .micro-card strong {
      display: block;
      font-size: 1.08rem;
      margin-bottom: 6px;
    }

    .micro-card span {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .form-card {
      display: grid;
      gap: 18px;
      padding: 26px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.36);
      border-radius: calc(var(--radius-xl) - 2px);
    }

    .form-card h3 {
      margin: 0;
      font-size: 1.55rem;
      letter-spacing: -0.02em;
    }

    .form-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 48px 15px 16px;
      outline: none;
      font-size: 1rem;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    [data-theme="dark"] .input-wrap input {
      background: rgba(15, 22, 38, 0.88);
    }

    .input-wrap input::placeholder {
      color: #8290ad;
    }

    .input-wrap input:focus {
      border-color: rgba(45, 107, 255, 0.7);
      box-shadow: 0 0 0 4px rgba(45, 107, 255, 0.12);
      transform: translateY(-1px);
    }

    .icon-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 8px;
      border-radius: 12px;
    }

    .icon-btn:hover {
      color: var(--primary);
      background: rgba(45, 107, 255, 0.08);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .remember input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .link:hover {
      text-decoration: underline;
    }

    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 34px rgba(45, 107, 255, 0.26);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      margin-top: 5%;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(45, 107, 255, 0.3);
      filter: saturate(1.04);
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--border);
    }

    .signup {
      text-align: center;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .signup a {
      color: var(--primary-2);
      text-decoration: none;
      font-weight: 800;
    }

    .signup a:hover {
      text-decoration: underline;
    }

    .illustration-panel {
      display: grid;
      align-content: stretch;
      padding: 24px;
      gap: 18px;
    }

    .illustration-card {
      position: relative;
      min-height: 100%;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(45, 107, 255, 0.26), transparent 34%),
        radial-gradient(circle at 78% 14%, rgba(142, 105, 255, 0.24), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.35));
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      padding: 24px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    [data-theme="dark"] .illustration-card {
      background:
        radial-gradient(circle at top left, rgba(45, 107, 255, 0.22), transparent 34%),
        radial-gradient(circle at 78% 14%, rgba(142, 105, 255, 0.2), transparent 30%),
        linear-gradient(180deg, rgba(12, 20, 38, 0.82), rgba(9, 15, 28, 0.72));
    }

    .assist-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .assist-top strong {
      display: block;
      font-size: 1.15rem;
      margin-bottom: 6px;
    }

    .assist-top p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(45, 107, 255, 0.12);
      color: var(--primary);
      font-size: 0.84rem;
      font-weight: 800;
      border: 1px solid rgba(45, 107, 255, 0.16);
      white-space: nowrap;
    }

    .assistant-scene {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 390px;
    }

    .halo {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45, 107, 255, 0.18), transparent 68%);
      filter: blur(10px);
      animation: pulse 4.8s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(0.96);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    .assistant-svg {
      position: relative;
      width: min(100%, 360px);
      height: auto;
      filter: drop-shadow(0 26px 36px rgba(25, 42, 84, 0.2));
      animation: bob 5s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .footer-note {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .footer-note span:last-child {
      color: var(--primary-2);
      font-weight: 800;
    }

    .reveal {
      animation: reveal 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .delay-1 {
      animation-delay: 120ms;
    }

    .delay-2 {
      animation-delay: 220ms;
    }

    .delay-3 {
      animation-delay: 320ms;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 980px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .illustration-panel {
        padding-top: 0;
      }

      .assistant-scene {
        min-height: 320px;
      }
    }

    @media (max-width: 680px) {
      .page {
        padding: 14px;
      }

      .brand-strip,
      .left,
      .form-card,
      .illustration-panel {
        padding-left: 18px;
        padding-right: 18px;
      }

      .micro-grid {
        grid-template-columns: 1fr;
      }

      .hero-copy h2 {
        font-size: clamp(2rem, 11vw, 3rem);
      }

      .assist-top {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="ambient" aria-hidden="true">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>

  <div class="panel reveal delay-1">
    <div class="form-card">
      <div>
        <h3>HireReady</h3>
        <p>Access your personalized interview preparation.</p>
      </div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" />
            <button class="icon-btn" id="togglePassword" type="button" aria-label="Show password">Show</button>
          </div>
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" id="remember">
            Remember me
          </label> <a class="link" href="signup.html">Forgot password?</a>
        </div>

        <button class="primary-btn" type="submit">
 Login
</button>
</form>
</div>
</div>
<script>

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

   e.preventDefault();

   const email = document.getElementById("email").value.trim();

   const password = document.getElementById("password").value.trim();

   const remember = document.getElementById("remember");

   if(email === ""){

      alert("Please enter email");

      return;
   }

   if(password === ""){

      alert("Please enter password");

      return;
   }

   // Remember Me

   if(remember.checked){

      localStorage.setItem("savedEmail", email);

   }else{

      localStorage.removeItem("savedEmail");

   }

   // Redirect only after validation

   window.location.href = "next.html";

});


// Auto-fill saved email

window.onload = function(){

 const savedEmail = localStorage.getItem("savedEmail");

 if(savedEmail){

   document.getElementById("email").value = savedEmail;

   document.getElementById("remember").checked = true;

 }

}

</script>
</body>
</html>
