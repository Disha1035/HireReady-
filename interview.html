<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interview </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#dce6ff,#ece5ff);

}

.container{

width:1100px;

padding:40px;

background:rgba(255,255,255,0.4);

border-radius:30px;

box-shadow:0 8px 25px rgba(0,0,0,0.1);

text-align:center;

}

h1{

font-size:60px;

color:#10254a;

margin-bottom:15px;

}

p{

font-size:25px;

color:#5d6b89;

margin-bottom:40px;

}

.boxes{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

}

.box{

height:160px;
display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

font-size:28px;

font-weight:bold;

color:white;

cursor:pointer;

border-radius:25px;

background:linear-gradient(135deg,#3b82f6,#6d28d9);

transition:0.3s;

}

.box:hover{

transform:translateY(-8px);

box-shadow:0 10px 20px rgba(0,0,0,0.2);

}

.back-btn{

margin-top:35px;

padding:15px 35px;

border:none;

border-radius:15px;

font-size:20px;

font-weight:bold;

cursor:pointer;

color:white;

background:#2563eb;

}

</style>

</head>

<body>

<div class="container">

<h1>Interview Activities</h1>

<p>Select an activity to begin your preparation</p>

<div class="boxes">
<div class="box" onclick="window.location.href='apptitute.html'">Aptitude Test</div>
<div class="box" onclick="window.location.href='coding.html'">Coding Challenge</div>
<div class="box" onclick="window.location.href='domain.html'">Mock Interview</div>
<div class="box" onclick="window.location.href='tech.html'">Technical Interview</div>
<div class="box" onclick="window.location.href='hr.html'">HR Interview</div>

</div>

<button class="back-btn" type="button"
        onclick="window.location.href='next.html'">
  Back
</button>    

</div>

</body>

</html>
